<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>qkv.io</title>
  <link rel="icon" type="image/png" href="character_2thumb.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding-right: 3vw;
      height: 100vh;
      line-height: 1.6;
      overflow: hidden;
      position: relative;
    }

    #bg-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background-image: url('character_bg.webp');
      background-size: cover;
      background-position: center;
      opacity: 0;
      animation: fadeIn 1.2s ease-in-out forwards;
    }

    #character-image {
      position: absolute;
      bottom: 0;
      left: -4%;
      height: 95vh;
      width: auto;
      z-index: 1;
      object-fit: contain;
      object-position: bottom left;
      opacity: 0;
      animation: fadeIn 1.2s ease-in-out 0.2s forwards;
      pointer-events: none;
    }

    .mobile-mode #bg-layer {
      background-image: url('image.webp');
    }

    .mobile-mode #character-image {
      display: none !important;
    }

    /* 内容卡片 */
    .content {
      position: relative;
      z-index: 2;
      background-color: rgba(255, 255, 255, 0.2);
      /* background: transparent; */
      padding: 0;
      border-radius: 20px;
      /* border: 1px solid rgba(255, 255, 255, 0.1); */
      /* box-shadow: 0 0 10px rgba(255, 255, 255, 0.1); */
      border: none;
      box-shadow: none;
      /* 背景模糊 */
      /* backdrop-filter: blur(20px); */
      /* -webkit-backdrop-filter: blur(20px); */

      width: min(40vw, 600px);
      min-width: 360px;
      height: 80vh;
      min-height: 500px;
      overflow: hidden;
      opacity: 0;
      transform: translateX(20px);
      animation: slideInRight 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    @keyframes slideInRight {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .uptime-iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 20px;
      background: transparent;
    }

    .mobile-mode {
      justify-content: center;
      align-items: center;
      padding-right: 0;
    }

    .mobile-mode .content {
      width: min(85vw, 560px);
      height: 70vh;
      min-height: 0;
      min-width: 0;
    }

    .logo {
      margin-bottom: 2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--accent-logo);
      color: #fff;
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: -0.05em;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1.125rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--accent-badge-bg);
      color: var(--accent-badge-text);
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      transition: background 0.3s ease;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: currentColor;
      border-radius: 50%;
      box-shadow: 0 0 8px currentColor;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: 0.5;
      }
    }
  </style>
</head>

<body>

  <div id="bg-layer"></div>
  <img id="character-image" src="character_2main.png" alt="character" aria-hidden="true" />

  <div class="content">
    <iframe src="https://status.qkv.io/status/default" class="uptime-iframe" title="System Status"
      loading="lazy" allowtransparency="true"></iframe>
  </div>

  <script>
    (function () {
      const charEl = document.getElementById("character-image");
      const content = document.querySelector(".content");
      const bgLayer = document.getElementById("bg-layer");

      // 碰撞阈值：0 = 刚碰到就切，0.3 = 重叠30%人物宽度才切，1 = 完全遮住才切
      const OVERLAP_THRESHOLD = 0.4;

      // iframe居中偏移：正值向左移，负值向右移
      const OFFSET = 125;

      function checkCollision() {
        if (!charEl || !charEl.naturalWidth || !content) return;

        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const charAspect = charEl.naturalWidth / charEl.naturalHeight;
        const charW = charAspect * vh * 0.95;
        const charRight = charW - vw * 0.04;
        const cardWidth = content.offsetWidth;

        // 人物右边缘到屏幕右边的剩余空间
        const remainingSpace = vw - charRight;
        // iframe右边距 = (剩余空间 - iframe宽度) / 2 + offset
        const idealPad = (remainingSpace - cardWidth) / 2 + OFFSET;
        document.body.style.paddingRight = Math.max(idealPad, vw * 0.03) + 'px';

        const cardLeft = content.getBoundingClientRect().left;
        const overlap = charRight - cardLeft;
        const collides = vw <= 768 || overlap > charW * OVERLAP_THRESHOLD;

        document.body.classList.toggle("mobile-mode", collides);
        if (collides) document.body.style.paddingRight = '';
      }

      if (charEl.complete && charEl.naturalWidth) {
        checkCollision();
      } else {
        charEl.addEventListener("load", checkCollision);
      }

      window.addEventListener("resize", checkCollision);
    })();
  </script>
</body>

</html>
