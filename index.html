<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>qkv.io</title>
  <link rel="icon" type="image/png" href="character_2thumb.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding-right: 3vw;
      height: 100vh;
      line-height: 1.6;
      overflow: hidden;
      position: relative;
    }

    #bg-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background-image: url('character_bg.webp');
      background-size: cover;
      background-position: center;
      opacity: 0;
      animation: fadeIn 1.2s ease-in-out forwards;
    }

    #character-canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      opacity: 0;
      animation: fadeIn 1.2s ease-in-out 0.2s forwards;
      pointer-events: none;
    }

    .mobile-mode #bg-layer {
      background-image: url('image.webp');
    }

    .mobile-mode #character-canvas {
      display: none !important;
    }

    /* 内容卡片 */
    .content {
      position: relative;
      z-index: 2;
      background-color: rgba(255, 255, 255, 0.4);
      /* background: transparent; */
      padding: 0;
      border-radius: 20px;
      /* border: 1px solid rgba(255, 255, 255, 0.1); */
      /* box-shadow: 0 0 10px rgba(255, 255, 255, 0.1); */
      border: none;
      box-shadow: none;
      /* 背景模糊 */
      /* backdrop-filter: blur(20px); */
      /* -webkit-backdrop-filter: blur(20px); */

      width: min(40vw, 600px);
      min-width: 360px;
      height: 80vh;
      min-height: 500px;
      overflow: hidden;
      opacity: 0;
      transform: translateX(20px);
      animation: slideInRight 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    @keyframes slideInRight {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .uptime-iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 20px;
      background: transparent;
    }

    .mobile-mode {
      justify-content: center;
      align-items: center;
      padding-right: 0;
    }

    .mobile-mode .content {
      width: min(85vw, 560px);
      height: 70vh;
      min-height: 0;
      min-width: 0;
    }

    .logo {
      margin-bottom: 2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--accent-logo);
      color: #fff;
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: -0.05em;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1.125rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--accent-badge-bg);
      color: var(--accent-badge-text);
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      transition: background 0.3s ease;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: currentColor;
      border-radius: 50%;
      box-shadow: 0 0 8px currentColor;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: 0.5;
      }
    }
  </style>
</head>

<body>

  <div id="bg-layer"></div>
  <canvas id="character-canvas"></canvas>

  <div class="content">
    <iframe src="https://status.qkv.io/status/default" class="uptime-iframe" title="System Status"
      loading="lazy" allowtransparency="true"></iframe>
  </div>

  <script src="js/live2dcubismcore.min.js"></script>
  <script src="js/pixi.min.js"></script>
  <script src="js/cubism4.min.js"></script>
  <script>
    (async function () {
      const canvas = document.getElementById('character-canvas');
      const content = document.querySelector('.content');

      const app = new PIXI.Application({
        view: canvas,
        backgroundAlpha: 0,
        resizeTo: window,
        autoDensity: true,
        resolution: window.devicePixelRatio || 1,
      });

      const model = await PIXI.live2d.Live2DModel.from(
        'live2d/yachiyo-kaguya/八千代辉夜姬.model3.json'
      );
      app.stage.addChild(model);

      const origW = model.width;
      const origH = model.height;
      const charAspect = origW / origH;

      // 宽度充足时，左右边距占视口宽度的比例（你调好的 0.2 = 20%）
      const IDEAL_MARGIN_RATIO = 0.2;

      function layout() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;

        // 先清除 mobile-mode，确保用非移动端的卡片宽度来计算
        document.body.classList.remove('mobile-mode');
        document.body.style.paddingRight = '';

        const charH = vh * 0.95;
        const scale = charH / origH;
        model.scale.set(scale);
        const charW = charAspect * charH;
        const cardWidth = content.offsetWidth;

        // 理想边距（宽度充足时）
        const idealMargin = vw * IDEAL_MARGIN_RATIO;
        // 两边能均分到的最大空间（模型+卡片放进去后的剩余 ÷ 2）
        const maxMargin = (vw - charW - cardWidth) / 2;
        // 取较小值 → 窗口缩窄时两侧同步缩小，始终左右等宽；允许缩到 0 后重叠
        const margin = Math.max(0, Math.min(idealMargin, maxMargin));

        // margin=0 后继续缩窄，人物和卡片开始重叠
        const overlap = Math.max(0, charW + cardWidth - vw);
        const cardTooNarrow = cardWidth / content.offsetHeight < 5 / 9;
        const collides = vw <= 768 || cardTooNarrow;


        if (collides) {
          document.body.classList.add('mobile-mode');
        } else {
          document.body.style.paddingRight = margin + 'px';
        }

        // 人物底部与 iframe 卡片底部对齐
        const cardBottom = content.getBoundingClientRect().bottom;
        model.x = margin;
        model.y = cardBottom - charH + 160;
      }

      // 眼睛跟随鼠标（canvas 本身 pointer-events: none，通过 document 监听）
      document.addEventListener('pointermove', (e) => {
        model.focus(e.clientX, e.clientY);
      });

      layout();
      window.addEventListener('resize', layout);
    })();
  </script>
</body>

</html>
