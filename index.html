<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status</title>
  <link rel="icon" href="./qkv-icon-matrix.svg" type="image/svg+xml">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap");

    :root {
      --page-gap: clamp(18px, 3vw, 40px);
      --frame-width: clamp(360px, 36vw, 600px);
      --page-bg: #f3ece2;
      --page-glow: rgba(255, 255, 255, 0.7);
      --frame-bg: #fbf7ef;
      --frame-border: rgba(116, 96, 73, 0.12);
      --shadow-lg: rgba(83, 66, 46, 0.08);
      --shadow-sm: rgba(83, 66, 46, 0.05);
    }

    * {
      margin: 0;
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      padding: var(--page-gap);
      display: grid;
      place-items: center;
      font-family: "Manrope", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, var(--page-glow) 0, transparent 34%), var(--page-bg);
    }

    .uptime-iframe {
      width: min(var(--frame-width), calc(100vw - (var(--page-gap) * 2)));
      height: auto;
      aspect-ratio: 0.69 / 1;
      max-height: calc(100vh - (var(--page-gap) * 2));
      display: block;
      border: 1px solid var(--frame-border);
      border-radius: 28px;
      background: var(--frame-bg);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.68),
        0 24px 56px var(--shadow-lg),
        0 8px 18px var(--shadow-sm);
      overflow: hidden;
    }

    @supports (min-height: 100dvh) {
      body {
        min-height: 100dvh;
      }

      .uptime-iframe {
        max-height: calc(100dvh - (var(--page-gap) * 2));
      }
    }

    @media (max-width: 768px) {
      :root {
        --page-gap: 14px;
        --frame-width: 100%;
      }

      body {
        padding:
          max(var(--page-gap), env(safe-area-inset-top))
          max(var(--page-gap), env(safe-area-inset-right))
          max(var(--page-gap), env(safe-area-inset-bottom))
          max(var(--page-gap), env(safe-area-inset-left));
        place-items: center;
        background: radial-gradient(circle at top, rgba(255, 255, 255, 0.56) 0, transparent 28%), #f3ebe0;
      }

      .uptime-iframe {
        width: min(100%, 420px);
        aspect-ratio: 0.66 / 1;
        max-height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - (var(--page-gap) * 2));
        border-radius: 24px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.68),
          0 10px 24px var(--shadow-sm);
      }
    }

    @supports (min-height: 100dvh) {
      @media (max-width: 768px) {
        body {
          min-height: 100dvh;
        }

        .uptime-iframe {
          max-height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - (var(--page-gap) * 2));
        }
      }
    }

    @media (max-width: 768px) and (orientation: landscape) {
      :root {
        --page-gap: 10px;
      }

      body {
        padding:
          max(var(--page-gap), env(safe-area-inset-top))
          max(var(--page-gap), env(safe-area-inset-right))
          max(var(--page-gap), env(safe-area-inset-bottom))
          max(var(--page-gap), env(safe-area-inset-left));
      }

      .uptime-iframe {
        width: min(100%, 500px);
        aspect-ratio: 0.92 / 1;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <iframe
    src="https://status.qkv.io/status/default"
    class="uptime-iframe"
    title="System Status"
    loading="eager"
    referrerpolicy="strict-origin-when-cross-origin"></iframe>
</body>
</html>
