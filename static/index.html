<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>qkv.io</title>
  <link rel="icon" type="image/png"
    href="https://cdn.jsdelivr.net/gh/HiderX/Tsukuyomi@latest/static/img/character_2thumb.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="js/main.js"></script>
  <link rel="stylesheet" href="css/main.css">
</head>

<body>

  <div id="loading" class="loading" role="status" aria-live="polite" aria-busy="true">
    <div class="loading__mb" aria-hidden="true">
      <div class="loading__label">
        <span class="hd">LOADING</span>
      </div>
    </div>
  </div>

  <div id="bg-layer"></div>
  <canvas id="character-canvas"></canvas>

  <div class="content">
    <iframe src="https://status.qkv.io/status/default" class="uptime-iframe" title="System Status"
      loading="eager" allowtransparency="true"></iframe>
  </div>

  <div id="chat-wrap" class="chat-wrap chat-wrap--hidden">
    <button type="button" id="chat-unfold" class="chat-unfold" aria-label="チャットを開く" title="チャットを開く">
      <svg class="chat-unfold-icon" viewBox="0 0 640 640" fill="currentColor" aria-hidden="true">
        <path d="M267.7 576.9C267.7 576.9 267.7 576.9 267.7 576.9L229.9 603.6C222.6 608.8 213 609.4 205 605.3C197 601.2 192 593 192 584L192 512L160 512C107 512 64 469 64 416L64 192C64 139 107 96 160 96L480 96C533 96 576 139 576 192L576 416C576 469 533 512 480 512L359.6 512L267.7 576.9zM332 472.8C340.1 467.1 349.8 464 359.7 464L480 464C506.5 464 528 442.5 528 416L528 192C528 165.5 506.5 144 480 144L160 144C133.5 144 112 165.5 112 192L112 416C112 442.5 133.5 464 160 464L216 464C226.4 464 235.3 470.6 238.6 479.9C239.5 482.4 240 485.1 240 488L240 537.7C272.7 514.6 303.3 493 331.9 472.8z"/>
      </svg>
    </button>
    <div class="chat-panel">
      <button type="button" id="chat-toggle" class="chat-toggle" aria-label="收起对话" title="收起">−</button>
      <div id="chat-messages" class="chat-messages" role="log" aria-live="polite"></div>
      <div class="chat-input-row">
        <input id="chat-input" class="chat-input" type="text" placeholder="和ヤチヨ聊聊吧～" maxlength="500" autocomplete="off" />
        <button type="button" id="chat-send" class="chat-send" aria-label="送信">送信</button>
      </div>
    </div>
  </div>

  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.10/browser/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
</body>

</html>
